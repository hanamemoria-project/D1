<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Upload Pesanan</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .kotak-form { background: white; padding: 20px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { margin-top: 20px; width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
        #status { margin-top: 15px; font-weight: bold; color: blue; }
    </style>
</head>
<body>

    <div class="kotak-form">
        <h2>Upload File Pesanan</h2>
        
        <form id="formPesanan">
            <label for="id_pesanan">ID Pesanan (Contoh: PESAN-123):</label>
            <input type="text" id="id_pesanan" name="id_pesanan" required>

            <label for="target">Pilih File Target (.mind):</label>
<input type="file" id="target" name="target" required>

            <label for="video">Pilih Video (Link Video):</label>
            <input type="file" id="video" name="video" accept="video/*" required>

            <button type="submit">Upload Sekarang</button>
        </form>

        <p id="status"></p>
    </div>

    <script>
        // GANTI TULISAN DI BAWAH INI DENGAN LINK CLOUDFLARE WORKER KAMU NANTI
        const LINK_WORKER_KAMU = "https://update-pesanan-supabase.hanamemoria.workers.dev/";

        document.getElementById('formPesanan').addEventListener('submit', async function(event) {
            event.preventDefault(); // Mencegah halaman refresh
            const statusText = document.getElementById('status');
            statusText.innerText = "Sedang mengupload, mohon tunggu...";

            const formData = new FormData(this);

            try {
                const response = await fetch(LINK_WORKER_KAMU, {
                    method: 'POST',
                    body: formData
                });
                
                const hasil = await response.text();
                statusText.innerText = hasil; // Menampilkan pesan sukses/gagal dari Worker
                statusText.style.color = response.ok ? "green" : "red";
                
                if(response.ok) this.reset(); // Kosongkan form jika sukses
            } catch (error) {
                statusText.innerText = "Terjadi kesalahan: " + error.message;
                statusText.style.color = "red";
            }
        });
    </script>
</body>
</html>
